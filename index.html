          "@type": "Answer",
          "text": "En los campos 'asignatura' y 'tema' puedes poner el valor que corresponda a la asignatura estudiada. Se acepta cualquier valor y también puedes pedírselo a GPT para que cambie automáticamente en todas las preguntas."

      },
      {
        "@type": "Question",
        "name": "¿Qué significa el campo 'ans' en el JSON?",

          "@type": "Answer",
          "text": "En el campo 'ans' va el valor de la respuesta correcta: a=1, b=2, c=3, d=4. GPT lo detecta automáticamente pero conviene verificar."
        }
      },
      {
        "@type": "Question",
        "name": "¿Puedo usar archivos TXT en lugar de JSON?",

          "text": "Sí, la nueva versión permite agregar archivos TXT y el Visor los interpretará como archivos JSON."
        }
      },

        "@type": "Question",
        "name": "¿Cómo creo cuestionarios si no sé de informática?",
